appId: com.okagentdigital.universalsurfacexd
productName: UniversalSurfaceXD
directories:
  output: dist
files:
  - dist/**/*
  - node_modules/**/*
  - assets/**/*
mac:
  target: dmg
  category: public.app-category.productivity
  icon: assets/icons/icon.icns
  artifactName: "UniversalSurfaceXD-${version}-mac.${ext}"
win:
  target: nsis
  icon: assets/icons/icon.ico
  artifactName: "UniversalSurfaceXD-${version}-win.${ext}"
linux:
  target: AppImage
  icon: assets/icons
  artifactName: "UniversalSurfaceXD-${version}-linux.${ext}"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: OkAgentDigital
  repo: UniversalSurfaceXD
