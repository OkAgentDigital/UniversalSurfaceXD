name: usxd-ci
version: 1.4.0
description: UniversalSurfaceXD for GitHub Actions and CI/CD pipelines
author: DevStudio
license: MIT

components:
  - name: core
    source: "@universalsurfacexd/core"
    version: ^1.4.0
    required: true
    config:
      mode: ci

  - name: sonic-vault
    source: "@universalsurfacexd/sonic-vault"
    version: ^1.0.0
    config:
      use_env_vars: true

  - name: sonic-run
    source: "@universalsurfacexd/sonic-run"
    version: ^1.0.0
    config:
      container_runtime: docker
      mcp_servers:
        - github

  - name: sonic-agent
    source: "@universalsurfacexd/sonic-agent"
    version: ^1.0.0
    config:
      ci_mode: true
      agent: github-actions

excluded_components:
  - workbench-ui
  - sonic-chasis
  - sonic-logs

build:
  output: usxd-ci
  target_os: [linux]
  target_arch: [amd64]
  static_linking: true

runtime:
  min_memory_mb: 128
  recommended_memory_mb: 512
  no_gui: true
  ephemeral: true

max_size_mb: 20
actual_size_mb: 15
